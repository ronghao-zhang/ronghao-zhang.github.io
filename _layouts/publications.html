---
layout: page
---

{% include scripts/publications.html %}
<div id="publications">
  <section class="bg"></section>
  <div class="publications-header">
    <h1 class="title">{{ page.title }}</h1>
    {% if site.data.scholar_stats.total_citations %}
    <div class="total-citations-box">
      <span class="total-citations-count">{{ site.data.scholar_stats.total_citations }}</span>
      <span class="total-citations-label">Total Citations</span>
    </div>
    {% endif %}
  </div>
  {% bibliography --group_by year --group_order descending %}
</div>
